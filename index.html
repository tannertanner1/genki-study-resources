<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>studyresources.jp</title>
    <meta name="description" content="Study resources." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #fff;
        color: #111;
        transition: background 0.15s, color 0.15s;
      }

      body.dark {
        background: #111;
        color: #eee;
      }

      header {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        position: relative;
        border-bottom: 1px solid #e5e5e5;
      }

      body.dark header {
        border-bottom-color: #333;
      }

      .site-title {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-weight: 600;
        letter-spacing: 0.01em;
        pointer-events: none;
      }

      main {
        flex: 1;
        padding: 32px 16px;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        border-top: 1px solid #e5e5e5;
      }

      body.dark footer {
        border-top-color: #333;
      }

      button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        color: #111;
        display: flex;
        align-items: center;
        line-height: 1;
        transition: color 0.1s;
      }

      button:hover { color: #999; }

      body.dark button { color: #eee; }
      body.dark button:hover { color: #888; }

      .ml-auto { margin-left: auto; }

      a {
        color: #737373;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.1s;
      }

      a:hover { color: #999; }

      body.dark a { color: #eee; }
      body.dark a:hover { color: #888; }

      .muted { color: #999; }
      body.dark .muted { color: #888; }
    </style>
  </head>
  <body>

    <header>
      <!-- Sidebar nav trigger — IconLayoutSidebarFilled (Tabler) -->
      <button type="button" aria-label="Toggle navigation">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M0 0h24v24H0z" fill="none"/>
          <path d="M6 21a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3zM18 5h-8v14h8a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1"/>
        </svg>
      </button>

      <span class="site-title">studyresources.jp</span>

      <!-- Settings dialog trigger — MoreHorizontal (Lucide) -->
      <button type="button" aria-label="Open settings" class="ml-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5"  cy="12" r="1"/>
          <circle cx="12" cy="12" r="1"/>
          <circle cx="19" cy="12" r="1"/>
        </svg>
      </button>
    </header>

    <main>
      <p class="muted"></p>
    </main>

    <footer>
      <a href="https://github.com/tannertanner1/studyresources" target="_blank" rel="noopener noreferrer">
        /studyresources
      </a>

      <!-- Theme toggle — IconBrightnessFilled (Tabler) -->
      <button type="button" aria-label="Toggle theme" id="theme-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M0 0h24v24H0z" fill="none"/>
          <path d="M17 3.34A10 10 0 1 1 2 12l.005-.324A10 10 0 0 1 17 3.34M8 5.072A8 8 0 0 0 12.001 20L12 4a8 8 0 0 0-4 1.072"/>
        </svg>
      </button>
    </footer>

    <script>
      document.getElementById('theme-btn').addEventListener('click', function () {
        document.body.classList.toggle('dark');
      });
    </script>

  </body>
</html>
