    <script>Genki.generateQuiz({
      format : 'practice',
      type : ['multi', 'fill'],
      info : 'Describe the following items using {!GRI|～そう|l13-p3}.',

      quizlet : [
        [
          // MULTIPLE CHOICE
          {
            question : 'すし<br>delicious',
            answers : [
              'Aこのすしはおいしそうです。',
              'このすしはおいしいそうです。',
              'このすしはおいしさそうです。',
              'このすしはおいしくなさそうです。'
            ]
          },

          {
            question : 'カレー<br>spicy',
            answers : [
              'Aこのカレーは<ruby>辛<rt>から</rt></ruby>そうです。',
              'このカレーは<ruby>辛<rt>から</rt></ruby>いそうです。',
              'このカレーは<ruby>辛<rt>から</rt></ruby>さそうです。',
              'このカレーは<ruby>辛<rt>から</rt></ruby>くなさそうです。'
            ]
          },

          {
            question : 'ケーキ<br>sweet',
            answers : [
              'Aこのケーキは<ruby>甘<rt>あま</rt></ruby>そうです。',
              'このケーキは<ruby>甘<rt>あま</rt></ruby>いそうです。',
              'このケーキは<ruby>甘<rt>あま</rt></ruby>さそうです。',
              'このケーキは<ruby>甘<rt>あま</rt></ruby>いです。'
            ]
          },

          {
            question : '<ruby>家<rt>いえ</rt></ruby><br>old',
            answers : [
              'Aこの<ruby>家<rt>いえ</rt></ruby>は<ruby>古<rt>ふる</rt></ruby>そうです。',
              'この<ruby>家<rt>いえ</rt></ruby>は<ruby>古<rt>ふる</rt></ruby>いそうです。',

              'この<ruby>家<rt>いえ</rt></ruby>は<ruby>古<rt>ふる</rt></ruby>さそうです。'
            ]
          },

          {
            question : 'アパート<br>new',
            answers : [
              'Aこのアパートは<ruby>新<rt>あたら</rt></ruby>しそうです。',
              'このアパートは<ruby>新<rt>あたら</rt></ruby>しいそうです。',
              'このアパートは<ruby>新<rt>あたら</rt></ruby>しいです。',
              'このアパートは<ruby>新<rt>あたら</rt></ruby>しさそうです。'

          {
            question : 'マンション<br>convenient',
            answers : [
              'Aこのマンションは<ruby>便利<rt>べんり</rt></ruby>そうです。',
              'このマンションは<ruby>便利<rt>べんり</rt></ruby>なそうです。',
              'このマンションは<ruby>便利<rt>べんり</rt></ruby>さそうです。',
              'このマンションは<ruby>便利<rt>べんり</rt></ruby>です。'
            ]
          },

          {
            question : '<ruby>先生<rt>せんせい</rt></ruby><br>strict',
            answers : [
              'Aこの<ruby>先生<rt>せんせい</rt></ruby>は<ruby>厳<rt>きび</rt></ruby>しそうです。',

              'この<ruby>先生<rt>せんせい</rt></ruby>は<ruby>厳<rt>きび</rt></ruby>しなそうです。'
            ]

            question : '<ruby>学生<rt>がくせい</rt></ruby><br>sleepy',

              'Aこの<ruby>学生<rt>がくせい</rt></ruby>は<ruby>眠<rt>ねむ</rt></ruby>そうです。',

              'この<ruby>学生<rt>がくせい</rt></ruby>は<ruby>寝<rt>ね</rt></ruby>りそうです。'

            answers : [
              'Aこのおじいさんは<ruby>元気<rt>げんき</rt></ruby>そうです。',
              'このおじいさんは<ruby>元気<rt>げんき</rt></ruby>なそうです。',
              'このおじいさんは<ruby>元気<rt>げんき</rt></ruby>いそうです。',
              'このおじいさんは<ruby>元気<rt>げんき</rt></ruby>です。'

              'この<ruby>子供<rt>こども</rt></ruby>は<ruby>悲<rt>かな</rt></ruby>しいそうです。',

              'この<ruby>子供<rt>こども</rt></ruby>は<ruby>悲<rt>かな</rt></ruby>しさそうです。'
            ]

              'Aこの<ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>はさびしそうです。',
              'この<ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>はさびしいそうです。',

            ]

              'Aこの<ruby>弁護士<rt>べんごし</rt></ruby>は<ruby>頭<rt>あたま</rt></ruby>がよさそうです。',

        '<div class="count-problems columns-2 clear">'+

            '<div class="problem">'+

            '<div class="problem">'+
              'ケーキ／sweet<br>'+
              '{このケーキは甘そうです|このケーキはあまそうです|answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>家<rt>いえ</rt></ruby>／old<br>'+
              '{この家は古そうです|このいえはふるそうです|' + Genki.getAlts('この{家}は{古}そうです', 'いえ|ふる') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              'アパート／new<br>'+
              '{このアパートは新しそうです|このアパートはあたらしそうです|answer}。'+
            '</div>'+

            '<div class="problem">'+
              'マンション／convenient<br>'+
              '{このマンションは便利そうです|このマンションはべんりそうです|answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>先生<rt>せんせい</rt></ruby>／strict<br>'+
              '{この先生は厳しそうです|このせんせいはきびしそうです|' + Genki.getAlts('この{先生}は{厳}しそうです', 'せんせい|きび') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>学生<rt>がくせい</rt></ruby>／sleepy<br>'+
              '{この学生は眠そうです|このがくせいはねむそうです|' + Genki.getAlts('この{学生}は{眠}そうです', 'がくせい|ねむ') + 'answer}。'+
            '</div>'+
          '</div>'+

          '<div>'+
            '<div class="problem">'+
              'おじいさん／energetic<br>'+
              '{このおじいさんは元気そうです|このおじいさんはげんきそうです|answer}。'+
            '</div>'+

            '<div class="problem">'+
              'おばあさん／mean<br>'+
              '{このおばあさんは意地悪そうです|このおばあさんはいじわるそうです|answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>子供<rt>こども</rt></ruby>／sad<br>'+
              '{この子供は悲しそうです|このこどもはかなしそうです|' + Genki.getAlts('この{子}{供}は{悲}しそうです', 'こ|ども|かな') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>／lonely<br>'+
              '{この男の人はさびしそうです|このおとこのひとはさびしそうです|' + Genki.getAlts('この{男}の{人}は{さび}しそうです', 'おとこ|ひと|寂') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>弁護士<rt>べんごし</rt></ruby>／smart<br>'+
              '{この弁護士は頭がよさそうです|このべんごしはあたまがよさそうです|' + Genki.getAlts('この{弁護士}は{頭}がよさそうです', 'べんごし|あたま') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              'やくざ／scary<br>'+
              '{このやくざは怖そうです|このやくざはこわそうです|answer}。'+
            '</div>'+
          '</div>'+
        '</div>'
      ]
    });</script>
