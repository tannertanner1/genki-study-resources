    <script>Genki.generateQuiz({
      type : 'multi',
      info : Genki.lang.std_culture + '<br>You may want to read the Culture Note about Names of Years (Genki II: p.44) if you haven\'t yet.',

      quizlet : [
        {
          question : 'The Japanese use two systems of reference for years. What are they?',
          answers : [
            'AGregorian calendar and <ruby>元号<rt>げんごう</rt></ruby>',
            'Julian calendar and <ruby>元号<rt>げんごう</rt></ruby>',
            'Gregorian and Julian calendar'
          ]
        },

        {
          question : 'What is <ruby>元号<rt>げんごう</rt></ruby>?',
          answers : [
            'AJapanese imperial eras that coincide with the emperors\' tenures.',
            'Japanese imperial eras that coincide with the emperors\' age.',
            'Japanese imperial eras that coincide with the moon\'s phases.'
          ]
        },

        {
          question : 'Under the <ruby>元号<rt>げんごう</rt></ruby> system the year 2020 was _____.',
          answers : [
            'A<ruby>令和<rt>れいわ</rt></ruby>2<ruby>年<rt>ねん</rt></ruby>',
            '<ruby>昭和<rt>しょうわ</rt></ruby>2<ruby>年<rt>ねん</rt></ruby>',
            '<ruby>明治<rt>めいじ</rt></ruby>2<ruby>年<rt>ねん</rt></ruby>'
          ]
        },

        {
          question : 'The five most recent eras were _____.',
          answers : [
            'AMeiji, Taisho, Showa, Heisei, and Reiwa',
            'Edo, Taisho, Showa, Heisei, and Reiwa',
            'Meiji, Taisho, Showa, Heian, and Edo'
          ]
        },

        {
          question : 'Meiji was the era _____.',
          answers : [
            'Aof modernization',
            'of war and economic growth',
            'of recession and big earthquakes'
          ]
        },

        {
          question : 'Taisho was the era _____.',
          answers : [
            'Athe movement toward democracy was born',
            'of modernization',
            'of war and economic growth'
          ]
        },

        {
          question : 'Showa was the era _____.',
          answers : [
            'Aof war and economic growth',
            'the movement toward democracy was born',
            'of recession and big earthquakes'
          ]
        },

        {
          question : 'Heisei was the era _____.',
          answers : [
            'Aof recession and big earthquakes',
            'of war and economic growth',
            'of modernization'
          ]
        },

        {
          question : 'Japanese people associate their birth years with _____.',
          answers : [
            'Athe 12 animals in the East Asian zodiac',
            'the 12 astrological signs in the Western zodiac',
            'the imperial eras'
          ]
        },

        {
          question : 'The east asian zodiac is referred to as _____.',
          answers : [
            'A<ruby>干支<rt>えと</rt></ruby> and <ruby>十二支<rt>じゅうにし</rt></ruby>',
            '<ruby>江戸<rt>えど</rt></ruby> and <ruby>十二支<rt>じゅうにし</rt></ruby>',
            '<ruby>干支<rt>えと</rt></ruby> and <ruby>十二時<rt>じゅうにじ</rt></ruby>'
          ]
        }
