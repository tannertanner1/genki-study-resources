    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Combine the kanji to create the following compound words. You can use the same kanji more than once.',

      quizlet :
        '<p class="sub-section">'+
          '<span style="font-size:24px;">気<i class="lesson-num">(5)</i>　生<i class="lesson-num">(6)</i>　外<i class="lesson-num">(6)</i>　先<i class="lesson-num">(6)</i>　学<i class="lesson-num">(6)</i>　天<i class="lesson-num">(5)</i>　日<i class="lesson-num">(4)</i>　国<i class="lesson-num">(6)</i>　今<i class="lesson-num">(5)</i>　大<i class="lesson-num">(6)</i></span><br>'+
          '<small>The numbers indicate the lesson in which the kanji first appeared in the reading and writing section.</small>'+
        '</p>'+

        '<div class="example-problem">大 + 国 = <ruby>大国<rt>たいこく</rt></ruby> (large country)</div>'+

        '<div class="count-problems columns-2 clear">'+
          '<div>'+
            '<div class="problem">{天気|てんき|furigana;width:150;hint:weather}</div>'+
            '<div class="problem">{先生|せんせい|furigana;width:150;hint:teacher}</div>'+
            '<div class="problem">{学生|がくせい|furigana;width:150;hint:student}</div>'+
            '<div class="problem">{大学|だいがく|furigana;width:150;hint:university}</div>'+
          '</div>'+

          '<div>'+
            '<div class="problem">{今日|きょう|furigana;width:150;hint:today}</div>'+
            '<div class="problem">{天国|てんごく|furigana;width:150;hint:heaven}</div>'+
            '<div class="problem">{外国|がいこく|furigana;width:150;hint:foreign country}</div>'+
            '<div class="problem">{学外|がくがい|furigana;width:150;hint:outside school*}</div>'+
          '</div>'+
        '</div>'+
        '<p style="text-align:right;">*bonus; does not appear in Genki at this point</p>'

    });</script>
