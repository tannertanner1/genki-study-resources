    <script>Genki.generateQuiz({
      format : 'practice',
      type : ['multi', 'fill'],
      info : 'Ask if it\'s okay to do the following things using {!GRI|～てもいいですか|l6-p4}.',

      quizlet : [
        [
          // MULTIPLE CHOICE
          {
            question : '[At a temple]<br><ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>る',
            answers : [
              'A<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>ってもいいですか。',
              '<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>ってもいいです。',
              '<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>っていいですか。',
              '<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>っていいです。'
            ]
          },

          {
            question : '[At a temple]<br>たばこを<ruby>吸<rt>す</rt></ruby>う',
            answers : [
              'Aたばこを<ruby>吸<rt>す</rt></ruby>ってもいいですか。',
              'たばこを<ruby>吸<rt>す</rt></ruby>ってもいいです。',
              'たばこを<ruby>吸<rt>す</rt></ruby>てもいいですか。',
              'たばこを<ruby>吸<rt>す</rt></ruby>てもいいです。'
            ]
          },

          {
            question : '[At a temple]<br><ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>る',
            answers : [
              'A<ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>ってもいいですか。',
              '<ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>っていいですか。',
              '<ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>てもいいですか。',
              '<ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>ていいですか。'
            ]
          },

          {
            question : '[At a temple]<br>いすに<ruby>座<rt>すわ</rt></ruby>る',
            answers : [
              'Aいすに<ruby>座<rt>すわ</rt></ruby>ってもいいですか。',
              'いすに<ruby>座<rt>すわ</rt></ruby>ってもいいです。',
              'いすに<ruby>座<rt>すわ</rt></ruby>っていいですか。',
              'いすに<ruby>座<rt>すわ</rt></ruby>っていいです。'
            ]
          },

          {
            question : '[At a Japanese home]<br>アルバムを<ruby>見<rt>み</rt></ruby>る',
            answers : [
              'Aアルバムを<ruby>見<rt>み</rt></ruby>てもいいですか。',
              'アルバムを<ruby>見<rt>み</rt></ruby>ていいですか。',
              'アルバムを<ruby>見<rt>み</rt></ruby>ってもいいですか。',
              'アルバムを<ruby>見<rt>み</rt></ruby>っていいですか。'
            ]
          },

          {
            question : '[At a Japanese home]<br>シャワーを<ruby>浴<rt>あ</rt></ruby>びる',
            answers : [
              'Aシャワーを<ruby>浴<rt>あ</rt></ruby>びてもいいですか。',
              'シャワーを<ruby>浴<rt>あ</rt></ruby>びていいですか。',
              'シャワーを<ruby>浴<rt>あ</rt></ruby>びてもいいです。',
              'シャワーを<ruby>浴<rt>あ</rt></ruby>びていいです。'
            ]
          },

          {
            question : '[At a Japanese home]<br><ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>める',
            answers : [
              'A<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>めてもいいですか。',
              '<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>めてもいいです。',
              '<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>めってもいいですか。',
              '<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>めってもいいです。'
            ]
          },

          {
            question : '[At a Japanese home]<br>エアコンを<ruby>消<rt>け</rt></ruby>す',
            answers : [
              'Aエアコンを<ruby>消<rt>け</rt></ruby>してもいいですか。',
              'エアコンを<ruby>消<rt>け</rt></ruby>していいですか。',
              'エアコンを<ruby>消<rt>け</rt></ruby>してもいいです。',
              'エアコンを<ruby>消<rt>け</rt></ruby>していいです。'
            ]
          }
        ],


        // WRITTEN
        '<div class="count-problems columns-2 clear">'+
          '<div>'+
            '<h4>[At a temple]</h4>'+

            '<div class="example-problem">'+
              '<div class="inner-problem">'+
                '<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>る<br>'+
                '{写真|しゃしん|answer}を{撮って|とって|answer}もいいですか。'+
              '</div>'+
            '</div>'+

            '<div class="problem">'+
              'たばこを<ruby>吸<rt>す</rt></ruby>う<br>'+
              '{たばこを吸ってもいいですか|たばこをすってもいいですか|' + Genki.getAlts('{たばこ}を{吸}っても{い}いですか', 'タバコ|す|良') + Genki.getAlts('{たばこ}を{吸}っても{よ}いですか', 'タバコ|す|良') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>部屋<rt>へや</rt></ruby>に<ruby>入<rt>はい</rt></ruby>る<br>'+
              '{部屋に入ってもいいですか|へやにはいってもいいですか|' + Genki.getAlts('{部屋}に{入}っても{い}いですか', 'へや|はい|良') + Genki.getAlts('{部屋}に{入}っても{よ}いですか', 'へや|はい|良') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              'いすに<ruby>座<rt>すわ</rt></ruby>る<br>'+
              '{いすに座ってもいいですか|いすにすわってもいいですか|' + Genki.getAlts('{いす}に{座}っても{い}いですか', '椅子|すわ|良') + Genki.getAlts('{いす}に{座}っても{よ}いですか', '椅子|すわ|良') + 'answer}。'+
            '</div>'+
          '</div>'+

          '<div>'+
            '<h4>[At a Japanese home]</h4>'+

            '<div class="problem">'+
              'アルバムを<ruby>見<rt>み</rt></ruby>る<br>'+
              '{アルバムを見てもいいですか|アルバムをみてもいいですか|' + Genki.getAlts('アルバムを{見}ても{よ}いですか', 'み|良') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              'シャワーを<ruby>浴<rt>あ</rt></ruby>びる<br>'+
              '{シャワーを浴びてもいいですか|シャワーをあびてもいいですか|' + Genki.getAlts('シャワーを{浴}びても{よ}いですか', 'あ|良') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              '<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>める<br>'+
              '{窓を閉めてもいいですか|まどをしめてもいいですか|' + Genki.getAlts('{窓}を{閉}めても{い}いですか', 'まど|し|良') + Genki.getAlts('{窓}を{閉}めても{よ}いですか', 'まど|し|良') + 'answer}。'+
            '</div>'+

            '<div class="problem">'+
              'エアコンを<ruby>消<rt>け</rt></ruby>す<br>'+
              '{エアコンを消してもいいですか|エアコンをけしてもいいですか|' + Genki.getAlts('エアコンを{消}しても{よ}いですか', 'け|良') + 'answer}。'+
            '</div>'+
          '</div>'+
        '</div>'
      ]
    });</script>
