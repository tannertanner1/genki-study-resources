    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems by {!GRI|qualifying the nouns with verbs|l9-p5}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>Look at the picture and answer the questions. Use the pattern ○○さんは～ている<ruby>人<rt>ひと</rt></ruby>です, describing what each person is currently doing.</p>'+

        '<div class="center big-margin">{!IMG|3rd-l9-w5-1.png|party}</div>'+

        '<div class="problem">'+
          'みどりさんはどの<ruby>人<rt>ひと</rt></ruby>ですか。<br>'+
          '{%(みどりさんは/)ハンバーガーを食べている人です|%(みどりさんは/)ハンバーガーをたべているひとです|' + Genki.getAlts('{みどりさんは}ハンバーガーを{食}べている{人}です', '|た|ひと') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'ともやさんはどの<ruby>人<rt>ひと</rt></ruby>ですか。<br>'+
          '{%(ともやさんは/)コーヒーを飲んでいる人です|%(ともやさんは/)コーヒーをのんでいるひとです|' + Genki.getAlts('{ともやさんは}コーヒーを{飲}んでいる{人}です', '|の|ひと') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'はなさんはどの<ruby>人<rt>ひと</rt></ruby>ですか。<br>'+
          '{%(はなさんは/)ピザを切っている人です|%(はなさんは/)ピザをきっているひとです|' + Genki.getAlts('{はなさんは}ピザを{切}っている{人}です', '|き|ひと') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'しんじさんはどの<ruby>人<rt>ひと</rt></ruby>ですか。<br>'+
          '{%(しんじさんは/)歌を歌っている人です|%(しんじさんは/)うたをうたっているひとです|' + Genki.getAlts('{しんじさんは}{歌}を{歌}っている{人}です', '|うた|うた|ひと') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'えりかさんはどの<ruby>人<rt>ひと</rt></ruby>ですか。<br>'+
          '{%(えりかさんは/)ともやさんと話している人です|%(えりかさんは/)ともやさんとはなしているひとです|' + Genki.getAlts('{えりかさんは}ともやさんと{話}している{人}です', '|はな|ひと') + 'answer}。'+
        '</div>'+
      '</div>'

    });</script>
