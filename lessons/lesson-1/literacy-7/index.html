    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Read the following people\'s self-introductions and answer the questions. Refer to the vocabulary list on page 38-40 of Genki I, if necessary.',

      quizlet :
      '<p class="section-desc">Read the following self-introductions.</p>'+
      '<div class="bubbles">'+
        '<div class="sub-section">'+
          '<strong class="bubble-number">1.</strong>'+
          '<div>たなか　まいです。<br>かいしゃいんです。</div>'+
        '</div>'+

        '<div class="sub-section">'+
          '<strong class="bubble-number">2.</strong>'+
          '<div>はらだ　りょうです。<br>だいがくせいです。<br>せんこうはれきしです。</div>'+
        '</div>'+

        '<div class="sub-section">'+
          '<strong class="bubble-number">3.</strong>'+
          '<div>かとう　ゆうとです。<br>だいがくいんせいです。<br>せんこうはけいざいです。</div>'+
        '</div>'+

        '<div class="sub-section">'+
          '<strong class="bubble-number">4.</strong>'+
          '<div>わたしのなまえはきたの　ひろみです。<br>こうこうのさんねんせいです。</div>'+
        '</div>'+

        '<div class="sub-section">'+
          '<strong class="bubble-number">5.</strong>'+
          '<div>やまだ　まことです。<br>だいがくせいです。<br>せんこうはにほんごです。</div>'+
        '</div>'+
      '</div>'+

      '<div class="count-problems">'+
        '<p class="section-desc">Answer the following questions in Japanese.</p>'+
        '<div class="problem">'+
          'Who is an office worker?<br>'+
          '{たなか%(　/ /)まい}。'+
        '</div>'+

        '<div class="problem">'+
          'Whose major is Japanese?<br>'+
          '{やまだ%(　/ /)まこと}。'+
        '</div>'+

        '<div class="problem">'+
          'Who is a high school student?<br>'+
          '{きたの%(　/ /)ひろみ}。'+
        '</div>'+

        '<div class="problem">'+
          'What is Harada\'s major.<br>'+
          '{れきし|歴史|answer}。'+
        '</div>'+

        '<div class="problem">'+
          'Whose major is economics?<br>'+
          '{かとう%(　/ /)ゆうと}。'+
        '</div>'+
      '</div>'

    });</script>
    <style type="text/css">
      .bubbles {
        width:90%;
        margin:0 auto;
      }

      .bubbles .sub-section {
        font-size:16px;
        position:relative;
        display:inline-block;
        vertical-align:top;
        margin:6px 20px 6px 6px;
        border-radius:12px;
      }

      .bubbles .bubble-number {
        font-size:13px;
        position:absolute;
        top:-6px;
        left:-18px;
      }
