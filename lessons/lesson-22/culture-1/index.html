    <script>Genki.generateQuiz({
      type : 'multi',
      info : Genki.lang.std_culture + '<br>You may want to read the Culture Note about Japan\'s Educational System (2) (Genki II: p.249) if you haven\'t yet.',

      quizlet : [
        {
          question : 'Those seeking to enter a Japanese university or college need to pass _____.',
          answers : [
            'Aan entrance exam',
            'a test of courage',
            'a drug test'
          ]
        },

        {
          question : 'Most entrance exams are held sometime from _____.',
          answers : [
            'AJanuary through March',
            'February through May',
            'October through December'
          ]
        },

        {
          question : 'There are also alternative admission methods, such as admission by _____.',
          answers : [
            'Arecommendation',
            'bribery',
            'dueling'
          ]
        },

        {
          question : 'When applying students don\'t have to choose the department they wish to enter.',
          answers : [
            'Afalse',
            'true'
          ]
        },

        {
          question : 'Since getting into good schools is highly competitive, many students supplement their regular class work by _____.',
          answers : [
            'Aattending a special preparation school',
            'Agetting private tutoring',
            'working part-time jobs',
            'reading books'
          ]
        },

        {
          question : 'Those who fail an entrance exam have to wait a year to take it again. What are these students called?',
          answers : [
            'A<ruby>一浪<rt>いちろう</rt></ruby> and <ruby>二浪<rt>にろう</rt></ruby>',
            '<ruby>一年生<rt>いちねんせい</rt></ruby> and <ruby>二年生<rt>にねんせい</rt></ruby>',
            '<ruby>一回<rt>いっかい</rt></ruby> and <ruby>二回<rt>にかい</rt></ruby>'
          ]
        },

        {
          question : 'What is a サークル?',
          answers : [
            'AA group of students devoted to a particular hobby, interest, sport, social activity, and so forth.',
            'It is a class in which a small group of students study an area of their major with a supervising professor.',
            'Part-time job.',
            'Job hunting.'
          ]
        },

        {
          question : 'What is a ゼミ?',
          answers : [
            'AIt is a class in which a small group of students study an area of their major with a supervising professor.',
            '!A group of students devoted to a particular hobby, interest, sport, social activity, and so forth.',
            'Part-time job.',
            'Job hunting.'
          ]
        },

        {
          question : 'What is a バイト?',
          answers : [
            'APart-time job.',
            '!A group of students devoted to a particular hobby, interest, sport, social activity, and so forth.',
            'It is a class in which a small group of students study an area of their major with a supervising professor.',
            'Job hunting.'
          ]
        },

        {
          question : 'What is <ruby>就活<rt>しゅうかつ</rt></ruby>?',
          answers : [
            'AJob hunting.',
            '!A group of students devoted to a particular hobby, interest, sport, social activity, and so forth.',
            'It is a class in which a small group of students study an area of their major with a supervising professor.',
            'Part-time job.'
          ]
        },

        {
          question : 'When do students usually start taking ゼミ?',
          answers : [
            'Atheir junior year',
            'their senior year',
            'their freshman year'
          ]
        },

        {
          question : 'What is バイト short for?',
          answers : [
            'Aアルバイト',
            'ギガバイト',
            'ボラバイト'
          ]
        },

        {
          question : 'Common part-time jobs include...',
          answers : [
            'Atutoring, teaching at prep schools, and working at shops or restaurants.',
            'tutoring, fighting crime, and working at bars or clubs.',
            'picking up trash, teaching at prepschools, and working at a maid cafe.'
          ]
        },

        {
          question : 'What is <ruby>就活<rt>しゅうかつ</rt></ruby> short for?',
          answers : [
            'A<ruby>就職活動<rt>しゅうしょくかつどう</rt></ruby>',
            '<ruby>生活費<rt>せいかつひ</rt></ruby>',
            '<ruby>就職<rt>しゅうしょく</rt></ruby>'
          ]
        },

        {
          question : 'Japanese college students usually start to look for a job in their _____ year.',
          answers : [
            'AJunior',
            'Senior',
            'Freshman'
          ]
        },

        {
          question : 'During <ruby>就活<rt>しゅうかつ</rt></ruby>, most students wear a dark-colored business suit, and some with dyed hair restore it to its natural black.',
          answers : [
            'Atrue',
            'false'
          ]
        }
