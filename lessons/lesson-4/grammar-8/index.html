        [
          // MULTIPLE CHOICE

            question : 'メアリーさんは<ruby>月曜日<rt>げつようび</rt></ruby>にレポートを<ruby>書<rt>か</rt></ruby>きましたか。',

              'いいえ、<ruby>書<rt>か</rt></ruby>きませんでした。',
              'いいえ、<ruby>書<rt>か</rt></ruby>きません。'

          {
            question : 'メアリーさんは<ruby>月曜日<rt>げつようび</rt></ruby>に<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ましたか。',

              'Aいいえ、<ruby>見<rt>み</rt></ruby>ませんでした。',

              'はい、<ruby>見<rt>み</rt></ruby>ます。'

              'はい、<ruby>聞<rt>き</rt></ruby>きました。',
              'はい、<ruby>聞<rt>き</rt></ruby>きます。'

            question : 'メアリーさんは<ruby>水曜日<rt>すいようび</rt></ruby>にテニスをしましたか。',

              'はい、します。',
              'いいえ、しませんでした。',
              'いいえ、しません。'

              'いいえ、<ruby>会<rt>あ</rt></ruby>いませんでした。',
              'いいえ、<ruby>会<rt>あ</rt></ruby>いません。'

              'Aいいえ、<ruby>行<rt>い</rt></ruby>きませんでした。',

              'はい、<ruby>行<rt>い</rt></ruby>きました。',

            '<div class="problem">'+

              '{いいえ、聞きませんでした|いいえ、ききませんでした|answer}。'+
            '</div>'+

            '<div class="problem">'+
              'メアリーさんは<ruby>水曜日<rt>すいようび</rt></ruby>にテニスをしましたか。<br>'+

          '<div>'+

              'メアリーさんは<ruby>金曜日<rt>きんようび</rt></ruby>に<ruby>お寺<rt>おてら</rt></ruby>に<ruby>行<rt>い</rt></ruby>きましたか。<br>'+
              '{いいえ、行きませんでした|いいえ、いきませんでした|answer}。'+
            '</div>'+

            '<div class="problem">'+
              'メアリーさんは<ruby>土曜日<rt>どようび</rt></ruby>にレポートを<ruby>書<rt>か</rt></ruby>きましたか。<br>'+
              '{いいえ、書きませんでした|いいえ、かきませんでした|answer}。'+
            '</div>'+

            '<div class="problem">'+
              'メアリーさんは<ruby>日曜日<rt>にちようび</rt></ruby>に<ruby>買い物<rt>かいもの</rt></ruby>をしましたか。<br>'+
              '{はい、しました}。'+
