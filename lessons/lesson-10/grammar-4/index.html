          '<div class="problem">'+
            'メアリーさんは<ruby>早<rt>はや</rt></ruby>い<ruby>電車<rt>でんしゃ</rt></ruby>に<ruby>乗<rt>の</rt></ruby>りました。<br>'+

          '</div>'+

          '<div class="problem">'+
            'メアリーさんはカフェで<ruby>熱<rt>あつ</rt></ruby>いコーヒーを<ruby>飲<rt>の</rt></ruby>みました。<br>'+
            '{ゆいさんは冷たいのを飲みました|ゆいさんはつめたいのをのみました|' + Genki.getAlts('ゆいさんは{冷}たいのを{飲}みました', 'つめ|の') + 'answer}。'+
          '</div>'+

          '<div class="problem">'+
            'メアリーさんは<ruby>安<rt>やす</rt></ruby>い<ruby>傘<rt>かさ</rt></ruby>を<ruby>買<rt>か</rt></ruby>いました。<br>'+
            '{ゆいさんはきれいなのを買いました|ゆいさんはきれいなのをかいました|' + Genki.getAlts('ゆいさんは{きれい}なのを{買}いました', '綺麗|か') + 'answer}。'+
          '</div>'+

          '<div class="problem">'+
            'メアリーさんは<ruby>赤<rt>あか</rt></ruby>い<ruby>手袋<rt>てぶくろ</rt></ruby>を<ruby>買<rt>か</rt></ruby>いました。<br>'+
