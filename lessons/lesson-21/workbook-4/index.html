    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|～てある|l21-p2}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">I</span>Describe the picture, using {!GRI|～てあります|l21-p2}.</p>'+
        '<div class="center">{!IMG|3rd-l21-wb4.png|Room}</div><br>'+
        '<div class="problem">{カーテンが開けてあります|カーテンがあけてあります|answer}。</div>'+
        '<div class="problem">{窓が閉めてあります|まどがしめてありま|' + Genki.getAlts('{窓}が{閉}めてあります', 'まど|し') + 'answer}。</div>'+
        '<div class="problem">{ポスターが貼ってあります|ポスターがはってあります|answer}。</div>'+
        '<div class="problem">{エアコンがつけてあります}。</div>'+
        '<div class="problem">{ケーキが焼いてあります|ケーキがやいてあります|answer}。</div>'+
      '</div><br>'+

      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">II</span>Translate the sentences, using {!GRI|～てあります|l21-p2}.</p>'+
        '<div class="problem">'+
          'It is cold. Is the heater on?<br>'+
          '{寒いですね。ヒーターがつけてありますか。|さむいですね。ヒーターがつけてありますか。|answer}'+
        '</div>'+

        '<div class="problem">'+
          'The dinner has been made. I hope it is delicious.<br>'+
          '{晩ご飯が作ってあります。おいしいといいんですが。|ばんごはんがつくってあります。おいしいといいんですが。|' + Genki.getAlts('{晩}ご{飯}が{作}ってあります。{おい}しいと{い}いんですが。', 'ばん|はん|つく|美味|良') + Genki.getAlts('{晩}ご{飯}が{作}ってあります。{おい}しいと{よ}いんですが。', 'ばん|はん|つく|美味|良') + 'answer}'+
        '</div>'+

        '<div class="problem">'+
          'Two tickets for Kabuki have been bought. Would you like to come with me?<br>'+
          '{かぶきのチケットが二枚買ってあります。一緒に行きませんか。|かぶきのチケットがにまいかってあります。いっしょにいきませんか。|' + Genki.getAlts('{歌舞伎}のチケットが{二枚}{買}ってあります。{一緒}に{行}きませんか。', 'かぶき|にまい|か|いっしょ|い') + 'answer}'+
        '</div>'+
      '</div>'

    });</script>
