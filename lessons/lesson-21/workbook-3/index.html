    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|passive forms|l21-p1} or {!GRI|～てもらう|l16-p1}.',

      quizlet :
      '<div class="count-problems valign-top">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>Describe the following situations, using either {!GRI|passive|l21-p1} or {!GRI|～てもらう|l16-p1}, whichever is appropriate in the given situation.</p>'+
        '<div class="example-problem">'+
          '<div class="inner-problem">'+
            'My brother cleaned my room.<br>'+
            '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は<ruby>兄<rt>あに</rt></ruby>に<ruby>部屋<rt>へや</rt></ruby>を<ruby>掃除<rt>そうじ</rt></ruby>してもらいました。<br><br>'+

            'My brother threw away my favorite magazine.<br>'+
            '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は<ruby>兄<rt>あに</rt></ruby>に<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>雑誌<rt>ざっし</rt></ruby>を<ruby>捨<rt>す</rt></ruby>てられました。'+
          '</div>'+
        '</div>'+

        '<div class="problem">'+
          'My brother taught me Japanese.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄に日本語を教えてもらいました|あにににほんごをおしえてもらいました|' + Genki.getAlts('{兄}に{日本語}を{教}えてもらいました', 'あに|にほんご|おし') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother broke my camera.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄にカメラを壊されました|あににカメラをこわされました|' + Genki.getAlts('{兄}にカメラを{壊}されました', 'あに|こわ') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother lent me his comic books.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄にまんがを貸してもらいました|あににまんがをかしてもらいました|' + Genki.getAlts('{兄}に{漫画}を{貸}してもらいました', 'あに|まんが|か') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother ate my chocolate.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄にチョコレートを食べられました|あににチョコレートをたべられました|' + Genki.getAlts('{兄}にチョコレートを{食}べられました', 'あに|た') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother treated me to dinner at a famous restaurant.<br>'+
      '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄に有名なレストランで晩ご飯をご馳走してもらいました|あににゆうめいなレストランでばんごはんをごちそうしてもらいました|' + Genki.getAlts('{兄}に{有名}なレストランで{晩}ご{飯}をご{馳走}してもらいました', 'あに|ゆうめい|ばん|はん|ちそう') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother makes a fool of me.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{兄に馬鹿にされます|あににばかにされます|answer}。'+
        '</div>'+

        '<div class="problem">'+
          'My brother often bullied me when I was a child.<br>'+
          '<i class="fa">&#xf061;</i>　<ruby>私<rt>わたし</rt></ruby>は{子供の時、兄によくいじめられました|こどものとき、あにによくいじめられました|' + Genki.getAlts('{子}{供}の{時}、{兄}に{よ}くいじめられました', 'こ|ども|とき|あに|良') + 'answer}。'+
        '</div>'+
      '</div>'

    });</script>
