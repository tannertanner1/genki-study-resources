    <script>Genki.generateQuiz({
      format : 'kana',
      type : ['kana', 'multi', 'fill', 'writing'],
      info : [Genki.lang.std_kana, Genki.lang.kana_multi, Genki.lang.kana_fill, Genki.lang.kana_writing],

      // drag and drop quizlet
      quizlet : [
        {
          'きゃ' : 'kya',
          'きゅ' : 'kyu',
          'きょ' : 'kyo',
          'ぎゃ' : 'gya',
          'ぎゅ' : 'gyu',
          'ぎょ' : 'gyo'
        },

        {
          'しゃ' : 'sha',
          'しゅ' : 'shu',
          'しょ' : 'sho',
          'じゃ' : 'ja',
          'じゅ' : 'ju',
          'じょ' : 'jo'
        },

        {
          'ちゃ' : 'cha',
          'ちゅ' : 'chu',
          'ちょ' : 'cho'
        },

        {
          'にゃ' : 'nya',
          'にゅ' : 'nyu',
          'にょ' : 'nyo'
        },

        {
          'ひゃ' : 'hya',
          'ひゅ' : 'hyu',
          'ひょ' : 'hyo',
          'びゃ' : 'bya',
          'びゅ' : 'byu',
          'びょ' : 'byo',
          'ぴゃ' : 'pya',
          'ぴゅ' : 'pyu',
          'ぴょ' : 'pyo'
        },

        {
          'みゃ' : 'mya',
          'みゅ' : 'myu',
          'みょ' : 'myo'
        },

        {
          'りゃ' : 'rya',
          'りゅ' : 'ryu',
          'りょ' : 'ryo'
        }
      ],

      // fill in the chart quizlet
      chart : '<table class="table large-width center">'+
        '<tr>'+
          '<td>きゃ<br>{kya}</td>'+
          '<td>きゅ<br>{kyu}</td>'+
          '<td>きょ<br>{kyo}</td>'+
          '<td>ぎゃ<br>{gya}</td>'+
          '<td>ぎゅ<br>{gyu}</td>'+
          '<td>ぎょ<br>{gyo}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>しゃ<br>{sha}</td>'+
          '<td>しゅ<br>{shu}</td>'+
          '<td>しょ<br>{sho}</td>'+
          '<td>じゃ<br>{ja}</td>'+
          '<td>じゅ<br>{ju}</td>'+
          '<td>じょ<br>{jo}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>ちゃ<br>{cha}</td>'+
          '<td>ちゅ<br>{chu}</td>'+
          '<td>ちょ<br>{cho}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>にゃ<br>{nya}</td>'+
          '<td>にゅ<br>{nyu}</td>'+
          '<td>にょ<br>{nyo}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>ひゃ<br>{hya}</td>'+
          '<td>ひゅ<br>{hyu}</td>'+
          '<td>ひょ<br>{hyo}</td>'+
          '<td>びゃ<br>{bya}<br>ぴゃ<br>{pya}</td>'+
          '<td>びゅ<br>{byu}<br>ぴゅ<br>{pyu}</td>'+
          '<td>びょ<br>{byo}<br>ぴょ<br>{pyo}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>みゃ<br>{mya}</td>'+
          '<td>みゅ<br>{myu}</td>'+
          '<td>みょ<br>{myo}</td>'+
        '</tr>'+

        '<tr>'+
          '<td>りゃ<br>{rya}</td>'+
          '<td>りゅ<br>{ryu}</td>'+
          '<td>りょ<br>{ryo}</td>'+
        '</tr>'+
      '</table>'
    });</script>
