    <script>Genki.generateQuiz({

        '<div>'+
          '<div class="problem">ご　　　{5}</div>'+
          '<div class="problem">ぜろ　　{0}</div>'+
          '<div class="problem">きゅう　{9}</div>'+
          '<div class="problem">さん　　{3}</div>'+
          '<div class="problem">なな　　{7}</div>'+
          '<div class="problem">に　　　{2}</div>'+
          '<div class="problem">ろく　　{6}</div>'+
          '<div class="problem">いち　　{1}</div>'+
          '<div class="problem">はち　　{8}</div>'+
          '<div class="problem">よん　　{4}</div>'+
        '</div>'+

        '<div>'+
          '<div class="problem">じゅうろく　　　　　　{16}</div>'+
          '<div class="problem">よんじゅう　　　　　　{40}</div>'+
          '<div class="problem">にじゅういち　　　　　{21}</div>'+
          '<div class="problem">ひゃくろくじゅうよん　{164}</div>'+
          '<div class="problem">きゅうじゅうに　　　　{92}</div>'+
          '<div class="problem">さんじゅうご　　　　　{35}</div>'+
          '<div class="problem">ななじゅうろく　　　　{76}</div>'+
          '<div class="problem">じゅうはち　　　　　　{18}</div>'+
          '<div class="problem">ひゃくごじゅうなな　　{157}</div>'+
