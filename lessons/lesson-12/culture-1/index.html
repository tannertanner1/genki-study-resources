          question : 'The seasons in Japan are _____.',
          answers : [
            'Avery different depending on where you go',
            'the same everywhere',
            'very mild'
          ]
        },

        {
          question : 'Where in Japan is winter sunny and dry?',
          answers : [
            'APacific coast',
            'Sea of Japan coast',
            'Tokyo'
          ]
        },

        {
          question : 'Where in Japan is winter cloudy and snowy?',
          answers : [
            'ASea of Japan coast',
            'Pacific coast',
            'Okinawa'
          ]
        },

        {
          question : 'Spring is rather short because _____.',
          answers : [
            'Atemperatures rise quickly and the rainy season arrives',
            'temperatures fall quickly and the rainy season arrives',
            'air pollution is high'
          ]
        },

        {
          question : 'How long does the rainy season typically last?',
          answers : [
            'Amonth and a half',
            'one month',
            'three months'
          ]
        },

        {
          question : 'Summer in most parts of Japan is _____.',
          answers : [
            'Ahot and very humid, almost tropical in some places',
            'hot and tropical',
            'very cold'
          ]
        },

        {
          question : 'Typhoons make occasional landfalls in _____.',
          answers : [
            'Asummer and early fall',
            'summer',
            'early fall'
          ]
        },

        {
          question : 'What temperature unit does Japan use?',
          answers : [
            'ACelsius',
            'Fahrenheit',
            'Kelvin'
          ]
        },

        {
          question : 'What is the Sea of Japan called in Japan?',
          answers : [
            'A<ruby>日本海<rt>にほんかい</rt></ruby>',
            '<ruby>太平洋<rt>たいへいよう</rt></ruby>',
            '<ruby>大西洋<rt>たいせいよう</rt></ruby>'
          ]
        },

        {
          question : 'What is the Pacific ocean called in Japan?',
          answers : [
            'A<ruby>太平洋<rt>たいへいよう</rt></ruby>',
            '<ruby>大西洋<rt>たいせいよう</rt></ruby>',
            '<ruby>日本海<rt>にほんかい</rt></ruby>'
          ]
        },

        {
          question : 'What is the rainy season called in Japan?',
          answers : [
            'A<ruby>梅雨<rt>つゆ</rt></ruby>',
            '<ruby>雨月<rt>うげつ</rt></ruby>',
            '<ruby>雨<rt>あめ</rt></ruby>'
          ]
        },

{
          question : 'When do the cherry trees blossom in Tokyo?',
          answers : [
            'ALate March',
            'Early May',
            'Mid January'
          ]
        },

        {
          question : 'When does the rainy season start in Tokyo?',
          answers : [
            'AMid-June',
            'Early May',
            'No rainy season'

        },

        {
          question : 'When is the first snowfall in Tokyo?',
          answers : [
            'AJanuary',
            'October',
            'No snow'
          ]
