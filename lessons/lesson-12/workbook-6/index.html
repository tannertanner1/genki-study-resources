    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|～でしょうか|l12-p6}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>You live in a dormitory and you will get a new roomate. Ask the coordinator what that person is like, using {!GRI|～でしょうか|l12-p6}.</p>'+
        '<div class="problem">'+
          'Is she/he Japanese?<br>'+
          '{日本人でしょうか|にほんじんでしょうか|answer}。'+
        '</div>'+

        '<div class="problem">'+
          'What is her/his major?<br>'+
          '{専攻は何でしょうか|せんこうはなんでしょうか|' + Genki.getAlts('{専攻}は{何}でしょうか', 'せんこう|なん') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'Is she/he a quiet person?<br>'+
          '{静かな人でしょうか|しずかなひとでしょうか|answer}。'+
        '</div>'+

        '<div class="problem">'+
          'What kind of music does she/he like?<br>'+
          '{どんな音楽が好きでしょうか|どんなおんがくがすきでしょうか|' + Genki.getAlts('どんな{音楽}が{好}きでしょうか', 'おんがく|す') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'Does she/he smoke?<br>'+
          '{たばこを吸うでしょうか|たばこをすうでしょうか|' + Genki.getAlts('{たばこ}を{吸}うでしょうか', 'タバコ|す') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'Does she/he have many friends?<br>'+
          '{友だちがたくさんいるでしょうか|ともだちがたくさんいるでしょうか|' + Genki.getAlts('{友}{だち}がたくさんいるでしょうか', 'とも|達') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'What kind of food does she/he like?<br>'+
          '{どんな食べ物が好きでしょうか|どんなたべものがすきでしょうか|' + Genki.getAlts('どんな{食べ物}が{好}きでしょうか', 'たべもの|す') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'Does she/he have a car?<br>'+
          '{車があるでしょうか|くるまがあるでしょうか|answer}。'+
        '</div>'+
      '</div>'

    });</script>
