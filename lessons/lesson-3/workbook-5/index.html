    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|～ませんか|l3-p5}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">I</span>Review Practice V-C (Genki I: p.99) and translate the following conversation.</p>'+
        '<div class="problem">メアリー：　{今晩映画を見ませんか|こんばんえいがをみませんか|' + Genki.getAlts('{今晩}{映画}を{見}ませんか', 'こんばん|えいが|み') + 'answer;width:300;hint:(Would you like to see a movie tonight?)}。</div>'+

        '<div class="problem">たけし　：　{今晩はちょっと|こんばんはちょっと|answer;width:300;hint:(Tonight is not a very good time...)}……。</div>'+

        '<div class="problem">たけし　：　{明日はどうですか|あしたはどうですか|answer;width:300;hint:(How about tomorrow?)}。</div>'+

        '<div class="problem">メアリー：　{いいですね|良いですね|よいですね|answer;hint:(Sounds great.);width:300}。</div>'+
      '</div>'+

      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">II</span>Translate the conversation between you (replace ○○ with your name) and your friend Abdul (アブドゥル).</p>'+
        '<div class="problem">○○　　　：　{アブドゥルさん、今晩晩ご飯を食べませんか|アブドゥルさん、こんばんばんごはんをたべませんか|' + Genki.getAlts('アブドゥルさん、{今晩}{晩}ご{飯}を{食}べませんか', 'こんばん|ばん|はん|た') + 'answer;width:420;hint:(Would you like to eat dinner tonight, Abdul?)}。</div>'+

        '<div class="problem">アブドゥル：　{いいですね|良いですね|よいですね|answer;hint:(Sounds great.);width:420}。</div>'+

        '<div class="problem">○○　　　：　{じゃあ、マクドナルドに行きませんか|じゃあ、マクドナルドにいきませんか|answer;width:420;hint:(Then, would you like to go to McDonald\'s?)<br><small>McDonald\'s = マクドナルド</small>}。</div>'+

        '<div class="problem">アブドゥル：　{マクドナルドはちょっと|(McDonald\'s is not a very good place...)|width:280}……{ウェンディーズはどうですか|(How about Wendy\'s?)<br><small>Wendy\'s = ウェンディーズ</small>|width:210}。</div>'+

        '<div class="problem">○○　　　：　{いいですね|良いですね|よいですね|answer;hint:(Sounds great.);width:420}。</div>'+
      '</div>'

    });</script>
