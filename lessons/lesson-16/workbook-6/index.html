    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|～時|l16-p4}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">I</span>Determine whether event A (the "when" clause) occurs earlier than event B (the main clause) or not, and translate the following sentences.</p>'+
        '<div class="problem" style="width:80%;">'+
          'When I go to Japan (=A), I want to stay at a Japanese inn (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{A|A/B}])<br><br></div>'+
          '{日本に行った時、旅館に泊まりたいです|にほんにいったとき、りょかんにとまりたいです|' + Genki.getAlts('{日本}に{行}った{時}、{旅館}に{泊}まりたいです', 'にほん|い|とき|りょかん|と') + 'answer}。'+
        '</div>'+

        '<div class="problem" style="width:80%;">'+
          'When I went to bed yesterday (=A), I didn\'t brush my teeth (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{B|A/B}])<br><br></div>'+
          '{きのう寝る時、歯を磨きませんでした|きのうねるとき、はをみがきませんでした|' + Genki.getAlts('{きのう}{寝}る{時}、{歯}を{磨}きませんでした', '昨日|ね|とき|は|みが') + 'answer}。'+
        '</div>'+

        '<div class="problem" style="width:80%;">'+
          'When I attended a volunteer activity (=A), I met various people (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{A|A/B}])<br><br></div>'+
          '{ボランティア活動に参加した時、いろいろな人に会いました|ボランティアかつどうにさんかしたとき、いろいろなひとにあいました|' + Genki.getAlts('ボランティア{活動}に{参加}した{時}、{いろいろ}な{人}に{会}いました', 'かつどう|さんか|とき|色々|ひと|あ') + 'answer}。'+
        '</div>'+

        '<div class="problem" style="width:80%;">'+
          'When I go to school (=A), I ride a bus (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{B|A/B}])<br><br></div>'+
          '{学校に行く時、バスに乗ります|がっこうにいくとき、バスにのります|' + Genki.getAlts('{学校}に{行}く{時}、バスに{乗}ります', 'がっこう|い|とき|の') + 'answer}。'+
        '</div>'+

        '<div class="problem" style="width:80%;">'+
          'When I bought this car (=A), I borrowed money from the bank (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{B|A/B}])<br><br></div>'+
          '{この車を買う時、銀行からお金を借りました|このくるまをかうとき、ぎんこうからおかねをかりました|' + Genki.getAlts('この{車}を{買}う{時}、{銀行}からお{金}を{借}りました', 'くるま|か|とき|ぎんこう|かね|か') + 'answer}。'+
        '</div>'+

        '<div class="problem" style="width:80%;">'+
          'When I received a present from my friend (=A), I was glad (=B).<br>'+
          '<div style="float:right;">(Which occurs first? [{A|A/B}])<br><br></div>'+
          '{友だちにプレゼントをもらった時、うれしかったです|ともだちにプレゼントをもらったとき、うれしかったです|' + Genki.getAlts('{友}{達}にプレゼントをもらった{時}、うれしかったです', 'とも|だち|とき') + 'answer}。'+
        '</div>'+
      '</div><br>'+

      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">II</span>Answer the questions by translating the sentences, using {!GRI|～時|l16-p4}.</p>'+
        '<div class="problem">'+
          'どんな<ruby>時<rt>とき</rt></ruby>、<ruby>悲<rt>かな</rt></ruby>しいですか。<br>'+
          '(I am sad when I eat dinner alone.)<br>'+
          '{一人で晩ご飯を食べる時、悲しいです|ひとりでばんごはんをたべるとき、かなしいです|' + Genki.getAlts('{一人}で{晩}ご{飯}を{食}べる{時}、{悲}しいです', 'ひとり|ばん|はん|た|とき|かな') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'さびしい<ruby>時<rt>とき</rt></ruby>、<ruby>何<rt>なに</rt></ruby>をしますか。<br>'+
          '(I call my parents when I\'m lonely.)<br>'+
          '{寂しい時、両親に電話します|さびしいとき、りょうしんにでんわします|' + Genki.getAlts('{寂}しい{時}、{両親}に{電話}します', 'さび|とき|りょうしん|でんわ') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'どんな<ruby>時<rt>とき</rt></ruby>、<ruby>緊張<rt>きんちょう</rt></ruby>しますか。<br>'+
          '(I am nervous when I give a speech [スピーチをする].)<br>'+
          '{スピーチをする時、緊張します|スピーチをするとき、きんちょうします|' + Genki.getAlts('スピーチをする{時}、{緊張}します', 'とき|きんちょう') + 'answer}。'+
        '</div>'+
      '</div>'

    });</script>
