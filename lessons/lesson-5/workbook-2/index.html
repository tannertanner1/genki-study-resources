    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Complete the following problems using {!GRI|present tense adjectives|l5-p1}.',

      quizlet :
      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">I</span>Answer the following questions by translating the given cues.</p>'+
        '<div class="problem">'+
          '<ruby>日本語<rt>にほんご</rt></ruby>の<ruby>宿題<rt>しゅくだい</rt></ruby>はやさしいですか。<br>'+
          '(No, Japanese homework is not easy.)<br>'+
          '{いいえ、%(日本語の宿題は/)やさしくないです|いいえ、%(にほんごのしゅくだいは/)やさしくないです|' + Genki.getAlts('いいえ、{日本語}の{宿題}はやさしくないです', 'にほんご|しゅくだい') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          '<ruby>今日<rt>きょう</rt></ruby>は<ruby>忙<rt>いそが</rt></ruby>しいですか。<br>'+
          '(Yes, today is busy.)<br>'+
          '{はい、%(今日は/)忙しいです|はい、%(きょうは/)いそがしいです|' + Genki.getAlts('はい、{今日}は{忙}しいです', 'きょう|いそが') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'あなたの<ruby>部屋<rt>へや</rt></ruby>はきれいですか。<br>'+
          '(No, my room is not clean.)<br>'+
          '{いいえ、%(私の部屋は/)きれいじゃないです|いいえ、%(わたしのへやは/)きれいじゃないです|' + Genki.getAlts('いいえ、{私}の{部屋}は{きれい}じゃないです', 'わたし|へや|綺麗') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          '<ruby>日本語<rt>にほんご</rt></ruby>のクラスはおもしろいですか。<br>'+
          '(Yes, Japanese class is interesting.)<br>'+
          '{はい、%(日本語のクラスは/)面白いです|はい、%(にほんごのクラスは/)おもしろいです|' + Genki.getAlts('はい、{日本語}のクラスは{面白}いです', 'にほんご|おもしろ') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'あなたの<ruby>町<rt>まち</rt></ruby>は<ruby>静<rt>しず</rt></ruby>かですか。<br>'+
          '(No, my town is not very quiet.)<br>'+
          '{いいえ、%(私の町は/)あまり静かじゃないです|いいえ、%(わたしのまちは/)あまりしずかじゃないです|' + Genki.getAlts('いいえ、{私}の{町}はあまり{静}かじゃないです', 'わたし|まち|しず') + 'answer}。'+
        '</div>'+
      '</div><br>'+

      '<div class="count-problems">'+
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd">II</span>Translate the following sentences into Japanese.</p>'+
        '<div class="problem">'+
          'This watch is expensive.<br>'+
          '{この時計は高いです|このとけいはたかいです|' + Genki.getAlts('この{時計}は{高}いです', 'とけい|たか') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'This coffee is not delicious.<br>'+
          '{このコーヒーはおいしくないです}。'+
        '</div>'+

        '<div class="problem">'+
          'Professor Yamashita is energetic.<br>'+
          '{山下先生は元気です|やましたせんせいはげんきです|' + Genki.getAlts('{山下}{先生}は{元気}です', 'やました|せんせい|げんき') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'The weather is not good.<br>'+
          '{天気はよくないです|てんきはよくないです|' + Genki.getAlts('{天気}は{よ}くないです', 'てんき|良') + 'answer}。'+
        '</div>'+

        '<div class="problem">'+
          'I will not be free tomorrow.<br>'+
          '{%(私は/)明日ひまじゃないです|%(わたしは/)あしたひまじゃないです|' + Genki.getAlts('{私}は{明日}{暇}じゃないです', 'わたし|あした|ひま') + Genki.getAlts('{明日}{暇}じゃないです', 'あした|ひま') + 'answer}。'+
        '</div>'+
      '</div>'

    });</script>
