    <script>Genki.generateQuiz({
      type : 'fill',
      info : 'Practice conjugating adjectives into the {!GRI|present tense|l5-p1}.',

      quizlet :
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>Fill in the conjugation table below.</p>'+
      '<div class="count-problems">'+
        '<p class="section-desc">い-adjectives</p>'+
        '<table class="table large-width center">'+
          '<tr>'+
            '<td></td>'+
            '<td>dictionary form</td>'+
            '<td>present affirmative</td>'+
            '<td>present negative</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">large</td>'+
            '<td>{大きい|おおきい|answer}</td>'+
            '<td>{大きいです|おおきいです|answer}</td>'+
            '<td>{大きくないです|おおきくないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">expensive</td>'+
            '<td>{高い|たかい|answer}</td>'+
            '<td>{高いです|たかいです|answer}</td>'+
            '<td>{高くないです|たかくないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">frightening</td>'+
            '<td>{怖い|こわい|answer}</td>'+
            '<td>{怖いです|こわいです|answer}</td>'+
            '<td>{怖くないです|こわくないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">interesting</td>'+
            '<td>{面白い|おもしろい|answer}</td>'+
            '<td>{面白いです|おもしろいです|answer}</td>'+
            '<td>{面白くないです|おもしろくないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">old</td>'+
            '<td>{古い|ふるい|answer}</td>'+
            '<td>{古いです|ふるいです|answer}</td>'+
            '<td>{古くないです|ふるくないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">good</td>'+
            '<td>{いい|よい|良い|answer}</td>'+
            '<td>{いいです|よいです|良いです|answer}</td>'+
            '<td>{よくないです|良くないです|answer}</td>'+
          '</tr>'+
        '</table><br>'+

        '<p class="section-desc">な-adjectives</p>'+
        '<table class="table large-width center">'+
          '<tr>'+
            '<td></td>'+
            '<td>dictionary form</td>'+
            '<td>present affirmative</td>'+
            '<td>present negative</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">quiet</td>'+
            '<td>{静か%(な/)|しずか%(な/)|answer}</td>'+
            '<td>{静かです|しずかです|answer}</td>'+
            '<td>{静かじゃないです|しずかじゃないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">beautiful</td>'+
            '<td>{綺麗%(な/)|きれい%(な/)|answer}</td>'+
            '<td>{綺麗です|きれいです|answer}</td>'+
            '<td>{綺麗じゃないです|きれいじゃないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">healthy</td>'+
            '<td>{元気%(な/)|げんき%(な/)|answer}</td>'+
            '<td>{元気です|げんきです|answer}</td>'+
            '<td>{元気じゃないです|げんきじゃないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">fond of</td>'+
            '<td>{好き%(な/)|すき%(な/)|answer}</td>'+
            '<td>{好きです|すきです|answer}</td>'+
            '<td>{好きじゃないです|すきじゃないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">disgusted</td>'+
            '<td>{嫌い%(な/)|きらい%(な/)|answer}</td>'+
            '<td>{嫌いです|きらいです|answer}</td>'+
            '<td>{嫌いじゃないです|きらいじゃないです|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem">lively</td>'+
            '<td>{にぎやか%(な/)}</td>'+
            '<td>{にぎやかです}</td>'+
            '<td>{にぎやかじゃないです}</td>'+
          '</tr>'+
        '</table>'+
      '</div>'

    });</script>
